<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Diet Plan</title>
    <style>
        @page {
            background: #0d0d1a;
            margin: 20mm;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #0d0d1a;
            /* dark background */
            color: #f5f5f5;
        }

        .page {
            margin: 30px;
            padding: 30px;
            background: #1a1a2e;
            /* dark card */
            border-radius: 12px;
            min-height: 95vh;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #f9c74f;
            /* yellow */
        }

        .plan {
            margin-bottom: 40px;
            page-break-after: always;
        }

        .plan:last-child {
            page-break-after: auto;
        }

        .plan-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #f9c74f;
            border-bottom: 2px solid #f9c74f;
            padding-bottom: 10px;
        }

        .meal-block {
            margin-bottom: 20px;
            padding: 15px 20px;
            border: 1px solid #f9c74f;
            border-radius: 8px;
            background: #0d0d1a;
            /* darker section */
        }

        .meal-block h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #f9c74f;
        }

        ul {
            margin: 0;
            padding-left: 20px;
            list-style: none;
        }

        li {
            margin: 8px 0;
            font-size: 15px;
            position: relative;
            padding-left: 22px;
        }

        li::before {
            content: "✔";
            position: absolute;
            left: 0;
            color: #f9c74f;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="page">
        <h1>Diet Plans</h1>

        {{#each plans}}
        <div class="plan">
            <div class="plan-title">{{category}}</div>
            {{#each meals}}
            <div class="meal-block">
                <h3>{{timeOfDay}}</h3>
                <ul>
                    {{#each items}}
                    <li>{{this}}</li>
                    {{/each}}
                </ul>
            </div>
            {{/each}}
        </div>
        {{/each}}
    </div>
</body>

</html>
